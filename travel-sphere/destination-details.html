<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destination Details – TravelSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar"><div class="container"><div class="nav-inner">
    <a href="index.html" class="nav-logo"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>Travel<span>Sphere</span></a>
    <div class="nav-links"><a href="index.html">Home</a><a href="destinations.html" class="active">Destinations</a><a href="packages.html">Packages</a><a href="hotels.html">Hotels</a><a href="trip-planner.html">Plan Trip</a><a href="bookings.html">Bookings</a><a href="reviews.html">Reviews</a><a href="contact.html">Contact</a></div>
    <div class="nav-actions"><button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle theme"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg></button><a href="bookings.html" class="btn btn-primary btn-sm">My Bookings</a></div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div></div></nav>
  <nav class="mobile-nav" id="mobileNav"><a href="index.html">Home</a><a href="destinations.html">Destinations</a><a href="packages.html">Packages</a><a href="hotels.html">Hotels</a><a href="trip-planner.html">Plan Trip</a><a href="bookings.html">Bookings</a><a href="reviews.html">Reviews</a><a href="contact.html">Contact</a></nav>

  <div id="pageContent" style="padding-top:72px;"></div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose" onclick="closeLightbox()">✕</button>
    <button class="lightbox-btn lightbox-prev" id="lbPrev">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img id="lbImg" src="" alt="" class="lightbox-img">
    <button class="lightbox-btn lightbox-next" id="lbNext">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="lightbox-counter" id="lbCounter"></div>
  </div>

  <button class="back-to-top" id="backToTop"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg></button>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const destId = params.get('id');

    function render() {
      const destinations = Storage.get(DB.destinations) || [];
      const dest = destinations.find(d => d.id === destId);
      if (!dest) {
        document.getElementById('pageContent').innerHTML = `<div class="container" style="padding:80px 0;text-align:center;"><h2>Destination not found</h2><a href="destinations.html" class="btn btn-primary" style="margin-top:16px;">Browse Destinations</a></div>`;
        return;
      }

      const hotels = (Storage.get(DB.hotels) || []).filter(h => h.destination === dest.name);
      const packages = (Storage.get(DB.packages) || []).filter(p => p.destination === dest.name);
      const reviews = (Storage.get(DB.reviews) || []).filter(r => r.destinationId === dest.id);

      const galleryImages = [dest.image,
        `https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&q=80`,
        `https://images.unsplash.com/photo-1501426026826-31c667bdf23d?w=800&q=80`,
        `https://images.unsplash.com/photo-1452421822248-d4c2b47f0c81?w=800&q=80`,
        `https://images.unsplash.com/photo-1488085061387-422e29b40080?w=800&q=80`,
      ];

      document.title = `${dest.name} – TravelSphere`;

      document.getElementById('pageContent').innerHTML = `
        <div class="container" style="padding:32px 24px;">
          <nav class="breadcrumb" style="color:var(--text-muted);margin-bottom:24px;">
            <a href="index.html" style="color:var(--text-muted)">Home</a>
            <span style="color:var(--text-light)">/</span>
            <a href="destinations.html" style="color:var(--text-muted)">Destinations</a>
            <span style="color:var(--text-light)">/</span>
            <span style="color:var(--text-primary)">${dest.name}</span>
          </nav>
        </div>

        <!-- Hero -->
        <div class="detail-hero" style="margin:0 24px 0;max-width:calc(100% - 48px);margin-left:auto;margin-right:auto;max-width:var(--max-w);margin:0 auto 0;padding:0 24px;">
          <div style="position:relative;height:480px;border-radius:24px;overflow:hidden;margin-bottom:40px;">
            <img src="${dest.image}" alt="${dest.name}" style="width:100%;height:100%;object-fit:cover;">
            <div class="detail-hero-overlay">
              <div class="detail-hero-meta">
                <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ${dest.country}</span>
                <span>★ ${dest.rating} (${dest.reviews.toLocaleString()} reviews)</span>
                <span>🏔 ${dest.adventureLevel}</span>
                <span>📅 Best in ${dest.season.join(', ')}</span>
              </div>
              <h1 style="font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);color:#fff;margin:8px 0;">${dest.name}</h1>
              <div class="tags">${dest.tags.map(t=>`<span style="background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:999px;font-size:.8rem;">${t}</span>`).join('')}</div>
            </div>
          </div>
        </div>

        <div class="container">
          <div class="detail-layout">
            <!-- Main Content -->
            <div>
              <!-- About -->
              <div class="dash-card" style="margin-bottom:32px;">
                <h2 style="margin-bottom:16px;">About ${dest.name}</h2>
                <p style="color:var(--text-secondary);line-height:1.8;font-size:1rem;">${dest.description} ${dest.name} is one of the world's most sought-after travel destinations, drawing visitors with its unique blend of natural beauty, rich culture, and unforgettable experiences. Whether you're seeking adventure, relaxation, or cultural immersion, ${dest.name} delivers on every front.</p>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px;">
                  <div style="text-align:center;padding:20px;background:var(--bg-secondary);border-radius:12px;">
                    <div style="font-size:1.5rem;font-weight:900;color:var(--primary);">${dest.priceRange}</div>
                    <div style="font-size:.8rem;color:var(--text-muted);">Budget Range</div>
                  </div>
                  <div style="text-align:center;padding:20px;background:var(--bg-secondary);border-radius:12px;">
                    <div style="font-size:1.5rem;font-weight:900;color:var(--primary);">${dest.adventureLevel}</div>
                    <div style="font-size:.8rem;color:var(--text-muted);">Activity Level</div>
                  </div>
                  <div style="text-align:center;padding:20px;background:var(--bg-secondary);border-radius:12px;">
                    <div style="font-size:1.5rem;font-weight:900;color:var(--primary);">${dest.popularity}%</div>
                    <div style="font-size:.8rem;color:var(--text-muted);">Popularity Score</div>
                  </div>
                </div>
              </div>

              <!-- Gallery -->
              <div class="dash-card" style="margin-bottom:32px;">
                <h2 style="margin-bottom:20px;">Photo Gallery</h2>
                <div class="gallery-grid">
                  ${galleryImages.map((img,i) => `
                    <div class="gallery-item" onclick="openLightbox(${i})">
                      <img src="${img}" alt="Gallery ${i+1}" loading="lazy">
                      <div class="gallery-overlay">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 6s4-6 11-6 11 6 11 6-4 6-11 6S1 6 1 6z"/><circle cx="12" cy="6" r="2"/></svg>
                      </div>
                    </div>`).join('')}
                </div>
              </div>

              <!-- Packages in this destination -->
              ${packages.length > 0 ? `
              <div class="dash-card" style="margin-bottom:32px;">
                <h2 style="margin-bottom:20px;">Available Packages</h2>
                <div style="display:flex;flex-direction:column;gap:16px;">
                  ${packages.map(p => `
                    <div style="display:grid;grid-template-columns:120px 1fr auto;gap:16px;align-items:center;padding:16px;background:var(--bg-secondary);border-radius:12px;">
                      <img src="${p.image}" alt="${p.name}" style="width:120px;height:80px;object-fit:cover;border-radius:8px;">
                      <div>
                        <h4>${p.name}</h4>
                        <div style="font-size:.8rem;color:var(--text-muted);margin-top:4px;">${p.duration} days • ${p.transport} • ${p.hotelCategory}</div>
                        <div style="font-size:.8rem;color:var(--text-muted);">Includes: ${p.included.slice(0,3).join(', ')}</div>
                      </div>
                      <div style="text-align:right;">
                        <div style="font-weight:800;color:var(--primary);font-size:1.1rem;">${formatINR(p.price)}</div>
                        <a href="packages.html?id=${p.id}" class="btn btn-primary btn-sm" style="margin-top:8px;">Book</a>
                      </div>
                    </div>`).join('')}
                </div>
              </div>` : ''}

              <!-- Reviews -->
              <div class="dash-card">
                <div class="flex-between" style="margin-bottom:24px;flex-wrap:wrap;gap:12px;">
                  <h2>Traveller Reviews</h2>
                  <span style="color:var(--text-muted);font-size:.875rem;">${reviews.length} reviews</span>
                </div>
                ${reviews.length > 0 ? `
                <div class="rating-overview">
                  <div class="rating-big">
                    <div class="number">${(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1)}</div>
                    <div>${starsHTML(Math.round(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length))}</div>
                    <div class="out-of">out of 5</div>
                  </div>
                  <div class="rating-bars">
                    ${[5,4,3,2,1].map(star => {
                      const count = reviews.filter(r=>r.rating===star).length;
                      const pct = Math.round((count/reviews.length)*100);
                      return `<div class="rating-bar-row">
                        <span class="label">${star}</span>
                        <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${pct}%"></div></div>
                        <span class="count">${count}</span>
                      </div>`;
                    }).join('')}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:16px;">
                  ${reviews.slice(0,5).map(r => `
                    <div class="review-card">
                      <div class="review-header">
                        <div class="review-author">
                          <div class="author-avatar">${r.avatar}</div>
                          <div>
                            <div style="font-weight:700;font-size:.9rem;">${r.userName}</div>
                            <div style="font-size:.8rem;color:var(--text-muted);">${formatDate(r.date)} ${r.verified?'<span style="color:var(--success);">✓ Verified</span>':''}</div>
                          </div>
                        </div>
                        ${starsHTML(r.rating)}
                      </div>
                      <div class="review-title">${r.title}</div>
                      <div class="review-body">${r.body}</div>
                      <div style="font-size:.8rem;color:var(--text-muted);margin-top:10px;">👍 ${r.helpful} people found this helpful</div>
                    </div>`).join('')}
                </div>
                <div style="text-align:center;margin-top:24px;">
                  <a href="reviews.html" class="btn btn-secondary">Read All Reviews</a>
                </div>` : `<div class="empty-state"><p>No reviews yet for this destination.</p><a href="reviews.html" class="btn btn-primary" style="margin-top:16px;">Write a Review</a></div>`}
              </div>
            </div>

            <!-- Sidebar -->
            <aside class="detail-sidebar">
              <div class="booking-card" style="margin-bottom:16px;">
                <h3>Plan Your Trip</h3>
                <div class="price-line">
                  <span class="price-amount">${formatINR(dest.minPrice)}</span>
                  <span class="price-per">/ person from</span>
                </div>
                <div style="margin-bottom:16px;">
                  <label class="form-label">Travel Dates</label>
                  <input type="date" class="form-input" id="travelDate" style="margin-bottom:8px;">
                  <input type="date" class="form-input" id="returnDate">
                </div>
                <div style="margin-bottom:16px;">
                  <label class="form-label">Travellers</label>
                  <select class="form-select" id="travelersCount">
                    ${[1,2,3,4,5,6].map(n=>`<option value="${n}">${n} Traveller${n>1?'s':''}</option>`).join('')}
                  </select>
                </div>
                <a href="trip-planner.html?dest=${dest.id}" class="btn btn-primary btn-full" style="margin-bottom:8px;">Plan with Planner</a>
                <a href="bookings.html" class="btn btn-secondary btn-full">Book Package</a>
              </div>

              <!-- Quick Facts -->
              <div class="dash-card" style="margin-bottom:16px;">
                <h4 style="margin-bottom:16px;">Quick Facts</h4>
                <div style="display:flex;flex-direction:column;gap:12px;">
                  ${[
                    ['📍', 'Location', `${dest.name}, ${dest.country}`],
                    ['🌍', 'Continent', dest.continent],
                    ['💰', 'Budget', `${dest.priceRange} — ${priceSymbol(dest.priceRange)}`],
                    ['🏔', 'Activity Level', dest.adventureLevel],
                    ['📅', 'Best Season', dest.season.join(' & ')],
                    ['⭐', 'Rating', `${dest.rating}/5 (${dest.reviews.toLocaleString()} reviews)`],
                    ['💵', 'From', `${formatINR(dest.minPrice)}/person`],
                  ].map(([icon,label,value])=>`
                    <div style="display:flex;justify-content:space-between;font-size:.875rem;padding-bottom:12px;border-bottom:1px solid var(--border);">
                      <span style="color:var(--text-muted);">${icon} ${label}</span>
                      <span style="font-weight:600;">${value}</span>
                    </div>`).join('')}
                </div>
              </div>

              <!-- Nearby Hotels -->
              ${hotels.length > 0 ? `
              <div class="dash-card">
                <h4 style="margin-bottom:16px;">Hotels Here</h4>
                <div style="display:flex;flex-direction:column;gap:12px;">
                  ${hotels.slice(0,3).map(h=>`
                    <a href="hotel-details.html?id=${h.id}" style="display:flex;gap:12px;align-items:center;">
                      <img src="${h.image}" alt="${h.name}" style="width:60px;height:50px;object-fit:cover;border-radius:8px;flex-shrink:0;">
                      <div>
                        <div style="font-weight:600;font-size:.875rem;">${h.name}</div>
                        <div style="font-size:.8rem;color:var(--text-muted);">${h.category} • ${formatINR(h.pricePerNight)}/night</div>
                        <div style="font-size:.8rem;color:#fbbf24;">★ ${h.rating}</div>
                      </div>
                    </a>`).join('')}
                </div>
                <a href="hotels.html" style="display:block;text-align:center;font-size:.875rem;color:var(--primary);margin-top:12px;">View all hotels →</a>
              </div>` : ''}
            </aside>
          </div>
        </div>

        <!-- Footer -->
        <footer style="background:#1a1f0e;color:rgba(255,255,255,.6);padding:32px 0;text-align:center;font-size:.875rem;margin-top:80px;">
          <div class="container"><p>© 2025 TravelSphere | <a href="destinations.html" style="color:var(--primary)">← Back to Destinations</a></p></div>
        </footer>
      `;

      initLightbox(galleryImages);
      document.getElementById('lbPrev').addEventListener('click', () => showLightboxImage(lightboxIndex - 1));
      document.getElementById('lbNext').addEventListener('click', () => showLightboxImage(lightboxIndex + 1));
    }

    render();
  </script>
</body>
</html>
